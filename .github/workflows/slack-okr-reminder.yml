name: Friday OKR Check-In

on:
  schedule:
    - cron: '0 14 * * 5'  # 2:00 PM UTC every Friday
  workflow_dispatch:

jobs:
  send-slack-message:
    runs-on: ubuntu-latest
    steps:
      - name: Send Friday OKR check-in to Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "🎉 *Happy Friday, team!*\n\n📋 *Weekly OKR Check-In Time!*\nBefore you wrap up, take a moment to:\n\n📈 Update your OKR progress for the week\n🏆 Celebrate any wins — big or small!\n📝 Note any risks or blockers for next week\n🎯 Set your focus for Monday\n\n_Have a great weekend!_ 🌟"
          }' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
